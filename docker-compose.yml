services:
  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:15
    depends_on:
      - db
    ports:
      - "8070:8069"
    volumes:
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo_data:/var/lib/odoo
      - ./custom_addons:/mnt/extra-addons
      - ./requirements.txt:/requirements.txt
    command: bash -c "pip install -r /requirements.txt && odoo -c /etc/odoo/odoo.conf --dev=reload,assets,qweb"
    restart: unless-stopped

volumes:
  db_data:
  odoo_data: